version: "3.8"

services:
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      # Maps host port 9092 to container port 9092, so clients on your machine can reach Kafka.
      - "9092:9092"
    environment:
      # Run in KRaft mode: no Zookeeper, Kafka manages its own metadata.
      KAFKA_KRAFT_MODE: true

      # ID for this Kafka cluster.
      CLUSTER_ID: kafka-cluster-1

      # ID for this broker/controller node. Must be unique per node in the cluster.
      KAFKA_NODE_ID: 1

      # Roles this node plays:
      #   broker     = stores and serves messages
      #   controller = manages cluster metadata (which brokers exist, topic/partition
      #                info, partition leadership) - replaces Zookeeper's job
      # One node here, so it does both.
      KAFKA_PROCESS_ROLES: broker,controller

      # List of controller nodes as id@host:port, used for the Raft leader election.
      # Port 9093 is the controller port, separate from the 9092 client port.
      # With only 1 controller, no real election happens.
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # Addresses/ports this broker binds to inside the container:
      #   PLAINTEXT (9092)  = client traffic
      #   CONTROLLER (9093) = controller/Raft traffic
      #   INTERNAL (29092)  = traffic from other containers (e.g. kafka-ui)
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,INTERNAL://:29092

      # Addresses advertised to clients for connecting back. Two are needed:
      #   - host clients (e.g. local terminal) can't resolve "kafka" -> use localhost:9092
      #   - other containers can't use "localhost" (resolves to themselves) -> use kafka:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092

      # Security protocol per listener. All PLAINTEXT (unencrypted) here.
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT

      # Which listener (from KAFKA_LISTENERS) handles controller traffic.
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # With multiple non-controller listeners defined, specify which one brokers
      # use to talk to each other.
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # Directory inside the container where Kafka stores data on disk (messages,
      # offsets, metadata). Lost on container removal unless mounted as a volume.
      KAFKA_LOG_DIRS: /var/lib/kafka/data

      # __consumer_offsets is an internal topic tracking each consumer group's last
      # read offset per partition, so consumers resume correctly after a restart.
      # This sets how many replicas of that topic to keep. Can't exceed broker
      # count - must stay 1 with only 1 broker.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

    volumes:
      - kafka-kraft:/var/lib/kafka/data

  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: true
    volumes:
      - ./kafka-ui-config/dynamic_config.yaml:/etc/kafkaui/dynamic_config.yaml
    depends_on:
      - kafka

volumes:
  kafka-kraft:
